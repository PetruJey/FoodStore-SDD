services:
  postgres:
    image: postgres:15
    container_name: foodstore-db
    environment:
      POSTGRES_DB: foodstore
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: foodstore-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
